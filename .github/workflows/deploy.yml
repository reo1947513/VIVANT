name: Deploy to Vercel

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Vercel token
        id: token
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "ℹ️ VERCEL_TOKEN not set — skipping deployment."
          fi
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        if: steps.token.outputs.available == 'true' && github.event_name == 'pull_request'
        run: npx vercel deploy --token "$VERCEL_TOKEN" --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_uz3NsscW8gTllYzwQf3grw8L

      - name: Deploy to Vercel (Production)
        if: steps.token.outputs.available == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx vercel deploy --token "$VERCEL_TOKEN" --yes --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_uz3NsscW8gTllYzwQf3grw8L
